<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="cap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
    <linearGradient id="tassel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <!-- Book base -->
  <rect x="10" y="38" width="44" height="20" rx="2" fill="url(#cap)"/>
  <rect x="10" y="38" width="44" height="3" fill="#0c8acc"/>
  <!-- Book spine -->
  <rect x="30" y="38" width="4" height="20" fill="#075985"/>
  <!-- Graduation cap mortarboard -->
  <polygon points="32,8 60,20 32,32 4,20" fill="url(#cap)"/>
  <polygon points="32,8 32,32 4,20" fill="#0284c7" opacity="0.4"/>
  <!-- Cap top highlight -->
  <polygon points="32,12 52,20 32,28 12,20" fill="#0EA5E9" opacity="0.6"/>
  <!-- Tassel cord -->
  <line x1="50" y1="22" x2="50" y2="40" stroke="url(#tassel)" stroke-width="2"/>
  <!-- Tassel -->
  <circle cx="50" cy="42" r="3" fill="url(#tassel)"/>
  <path d="M 47 44 L 47 52 M 49 44 L 49 52 M 51 44 L 51 52 M 53 44 L 53 52" stroke="url(#tassel)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
